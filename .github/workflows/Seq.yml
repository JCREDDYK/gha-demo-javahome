name: Sequential-job
on: workflow_dispatch
jobs:
  build:
   runs-on: ubuntu-latest
   steps:
    - name: Build step
      run: echo "A Build stage"
  test:
   runs-on: ubuntu-latest
   needs: build
   steps:
    - name: Test Phase
      run: echo "A Test Phase"
  deploy:
   runs-on: ubuntu-latest
   needs: test
   steps:
    - name: Deploy App
      run: echo "Deploying App"
     
